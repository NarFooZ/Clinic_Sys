<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الاستقبال - عيادات الشفاء</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   DESIGN SYSTEM - لون أزرق طبي نظيف وعصري
============================================================ */
:root {
  --primary: #0ea5e9;
  --primary-dark: #0284c7;
  --primary-light: #e0f2fe;
  --accent: #06b6d4;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --dark: #0f172a;
  --dark2: #1e293b;
  --mid: #334155;
  --muted: #64748b;
  --border: #e2e8f0;
  --bg: #f0f9ff;
  --card: #ffffff;
  --sidebar-w: 260px;
  --radius: 14px;
  --shadow: 0 2px 8px rgba(14,165,233,.12);
  --shadow-lg: 0 8px 32px rgba(14,165,233,.18);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--dark);direction:rtl}
.hidden{display:none!important}

/* ============ LOGIN ============ */
#loginPage{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0f172a 0%,#0c4a6e 50%,#0ea5e9 100%);
  position:relative;overflow:hidden;
}
#loginPage::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%230ea5e9' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.login-card{
  background:rgba(255,255,255,.97);border-radius:24px;padding:48px 40px;
  width:100%;max-width:440px;box-shadow:0 32px 80px rgba(0,0,0,.35);
  position:relative;z-index:1;
}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .icon-wrap{
  width:80px;height:80px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  border-radius:20px;display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;box-shadow:0 8px 24px rgba(14,165,233,.4);
}
.login-logo .icon-wrap i{font-size:2rem;color:white}
.login-logo h1{font-size:1.6rem;color:var(--dark);font-weight:700}
.login-logo p{color:var(--muted);font-size:.9rem;margin-top:4px}
.form-group{margin-bottom:20px}
.form-group label{display:block;margin-bottom:8px;font-weight:600;font-size:.9rem;color:var(--mid)}
.form-group input,.form-group select{
  width:100%;padding:13px 16px;border:2px solid var(--border);border-radius:12px;
  font-size:.95rem;font-family:inherit;transition:all .2s;background:var(--bg);
}
.form-group input:focus,.form-group select:focus{
  outline:none;border-color:var(--primary);background:#fff;
  box-shadow:0 0 0 3px rgba(14,165,233,.12);
}
.btn{
  padding:13px 24px;border:none;border-radius:12px;font-size:.95rem;font-weight:600;
  cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px;
  font-family:inherit;justify-content:center;
}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;width:100%}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(14,165,233,.4)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-secondary{background:var(--mid);color:#fff}
.btn-warning{background:var(--warning);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--mid)}
.btn-sm{padding:8px 16px;font-size:.85rem;border-radius:10px}
.btn-xs{padding:6px 12px;font-size:.8rem;border-radius:8px}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}

/* ============ LAYOUT ============ */
#app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}
.sidebar{
  background:var(--dark2);color:#fff;padding:24px 16px;
  position:fixed;right:0;top:0;height:100vh;width:var(--sidebar-w);
  overflow-y:auto;z-index:50;display:flex;flex-direction:column;
}
.sidebar-logo{text-align:center;padding-bottom:24px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:20px}
.sidebar-logo .s-icon{
  width:56px;height:56px;background:linear-gradient(135deg,var(--primary),var(--accent));
  border-radius:16px;display:flex;align-items:center;justify-content:center;
  margin:0 auto 10px;font-size:1.4rem;
}
.sidebar-logo h2{font-size:1rem;color:#e2e8f0}
.sidebar-logo .role{font-size:.78rem;color:#94a3b8;margin-top:4px}
.nav-section{margin-bottom:8px}
.nav-label{font-size:.72rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.08em;padding:0 12px;margin-bottom:6px}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;
  cursor:pointer;transition:all .2s;color:#94a3b8;font-size:.9rem;margin-bottom:3px;
}
.nav-item:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.nav-item.active{background:rgba(14,165,233,.2);color:var(--primary);font-weight:600}
.nav-item i{width:20px;text-align:center;font-size:.95rem}
.nav-badge{margin-right:auto;background:var(--danger);color:#fff;padding:2px 7px;border-radius:8px;font-size:.72rem}
.sidebar-footer{margin-top:auto;border-top:1px solid rgba(255,255,255,.08);padding-top:16px}
.user-chip{
  display:flex;align-items:center;gap:10px;padding:10px;
  background:rgba(255,255,255,.05);border-radius:12px;margin-bottom:10px;
}
.user-chip .av{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;color:#fff;
}
.user-chip .uc-info{font-size:.82rem}
.user-chip .uc-name{font-weight:600;color:#e2e8f0}
.user-chip .uc-role{color:#64748b}

/* ============ MAIN ============ */
.main{margin-right:var(--sidebar-w);padding:28px;background:var(--bg);min-height:100vh}
.top-bar{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--card);border-radius:var(--radius);padding:18px 24px;
  box-shadow:var(--shadow);margin-bottom:24px;
}
.top-bar h1{font-size:1.3rem;color:var(--dark);font-weight:700}
.top-bar .tb-right{display:flex;align-items:center;gap:12px}
.clock-badge{
  background:var(--primary-light);color:var(--primary-dark);
  padding:8px 14px;border-radius:10px;font-size:.85rem;font-weight:600;
  display:flex;align-items:center;gap:6px;
}

/* ============ CARDS ============ */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:24px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.card-header h2{font-size:1.1rem;color:var(--dark);font-weight:700;display:flex;align-items:center;gap:8px}
.card-header h2 i{color:var(--primary)}

/* ============ STATS ============ */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat{
  background:var(--card);border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;
  transition:transform .2s;
}
.stat:hover{transform:translateY(-3px)}
.stat .st-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.st-blue{background:#dbeafe;color:#2563eb}
.st-green{background:#d1fae5;color:#059669}
.st-orange{background:#fef3c7;color:#d97706}
.st-red{background:#fee2e2;color:#dc2626}
.stat .st-val{font-size:1.6rem;font-weight:800;color:var(--dark);line-height:1}
.stat .st-label{font-size:.82rem;color:var(--muted);margin-top:4px}

/* ============ TABLE ============ */
.tbl-wrap{overflow-x:auto}
table.dtbl{width:100%;border-collapse:collapse}
table.dtbl th{background:#f8fafc;padding:12px 14px;text-align:right;font-size:.83rem;color:var(--muted);font-weight:600;border-bottom:2px solid var(--border)}
table.dtbl td{padding:14px;border-bottom:1px solid #f1f5f9;color:var(--dark);font-size:.9rem}
table.dtbl tr:hover td{background:#f8fafc}
table.dtbl tr:last-child td{border-bottom:none}
.badge{padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;display:inline-block}
.b-waiting{background:#fef3c7;color:#92400e}
.b-in_progress{background:#dbeafe;color:#1e40af}
.b-completed{background:#d1fae5;color:#065f46}
.b-paid{background:#dcfce7;color:#166534}

/* ============ MODAL ============ */
.overlay{
  position:fixed;inset:0;background:rgba(15,23,42,.6);
  display:flex;align-items:center;justify-content:center;
  z-index:200;backdrop-filter:blur(4px);padding:20px;
}
.modal{
  background:var(--card);border-radius:20px;padding:32px;
  width:100%;max-width:680px;max-height:90vh;overflow-y:auto;
  box-shadow:0 32px 80px rgba(0,0,0,.3);animation:slideUp .25s ease;
}
.modal-lg{max-width:900px}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.modal-header h2{font-size:1.2rem;color:var(--dark);font-weight:700}
.close-btn{background:none;border:none;font-size:1.4rem;color:var(--muted);cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s}
.close-btn:hover{background:#fee2e2;color:var(--danger)}

/* ============ PAYMENT PANEL ============ */
.pay-panel{
  display:grid;grid-template-columns:1fr 340px;gap:20px;
  height:calc(100vh - 200px);max-height:680px;
}
.proc-list{border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
.proc-list .pl-header{padding:14px 16px;background:var(--primary-light);border-bottom:1px solid var(--border)}
.proc-list .pl-header input{
  width:100%;border:2px solid var(--border);border-radius:10px;padding:9px 12px;
  font-family:inherit;font-size:.88rem;
}
.proc-list .pl-header input:focus{outline:none;border-color:var(--primary)}
.proc-items{flex:1;overflow-y:auto}
.proc-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;border-bottom:1px solid #f1f5f9;cursor:pointer;
  transition:background .15s;
}
.proc-item:hover{background:var(--primary-light)}
.proc-item .pi-name{font-size:.9rem;font-weight:600;color:var(--dark)}
.proc-item .pi-price{font-size:.85rem;color:var(--success);font-weight:700}
.proc-item .pi-clinic{font-size:.75rem;color:var(--muted)}

/* Cart / Receipt side */
.pay-receipt{display:flex;flex-direction:column;gap:12px}
.receipt-card{
  background:linear-gradient(135deg,#f0f9ff,#e0f2fe);
  border:2px solid var(--border);border-radius:var(--radius);padding:20px;flex:1;overflow-y:auto;
}
.receipt-card h3{font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.cart-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 12px;background:white;border-radius:10px;margin-bottom:8px;
}
.cart-item .ci-name{font-size:.88rem;font-weight:600}
.cart-item .ci-price{font-size:.88rem;color:var(--success);font-weight:700}
.cart-item .ci-del{background:none;border:none;color:var(--danger);cursor:pointer;padding:4px;border-radius:6px}
.cart-item .ci-del:hover{background:#fee2e2}
.cart-total{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px;background:var(--primary);color:#fff;border-radius:12px;font-weight:700;font-size:1rem;
}
.pmethods{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.pm-btn{
  border:2px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;
  cursor:pointer;transition:all .2s;background:#fff;
}
.pm-btn:hover{border-color:var(--primary)}
.pm-btn.sel{border-color:var(--primary);background:var(--primary-light)}
.pm-btn i{font-size:1.2rem;display:block;margin-bottom:4px}
.pm-btn span{font-size:.75rem;font-weight:600}
.pm-cash i{color:var(--success)}
.pm-visa i{color:#1d4ed8}
.pm-mastercard i{color:#ef4444}
.pm-mada i{color:var(--success)}
.pm-apple i{color:var(--dark)}
.pm-bank i{color:var(--warning)}
.pm-cliq i{color:#8b5cf6}

/* ============ SEARCH ============ */
.search-box{position:relative}
.search-box input{
  padding:11px 40px 11px 16px;border:2px solid var(--border);border-radius:12px;
  font-family:inherit;font-size:.9rem;width:280px;transition:all .2s;
}
.search-box input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(14,165,233,.1)}
.search-box i{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--muted)}

/* ============ FORM ============ */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fgrid-3{grid-template-columns:1fr 1fr 1fr}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:7px;font-weight:600;font-size:.85rem;color:var(--mid)}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:11px;
  font-size:.9rem;font-family:inherit;transition:all .2s;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(14,165,233,.1);
}
.age-pill{
  background:#d1fae5;color:#065f46;padding:8px 14px;border-radius:8px;
  font-weight:700;font-size:.9rem;display:inline-flex;align-items:center;gap:6px;margin-top:6px;
}
.section-title{
  font-size:.9rem;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--border);
  display:flex;align-items:center;gap:6px;
}
.section-title i{color:var(--primary)}

/* ============ SETTINGS TABS ============ */
.tabs{display:flex;gap:4px;background:#f1f5f9;padding:4px;border-radius:12px;width:fit-content;margin-bottom:20px}
.tab{padding:9px 20px;border-radius:10px;cursor:pointer;font-weight:600;font-size:.88rem;color:var(--muted);border:none;background:none;font-family:inherit;transition:all .2s}
.tab.active{background:var(--card);color:var(--primary);box-shadow:var(--shadow)}
.tab:hover:not(.active){color:var(--dark)}
.tab-content{display:none}
.tab-content.active{display:block}

/* ============ TOAST ============ */
#toasts{position:fixed;top:20px;left:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{
  background:#fff;padding:14px 18px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.15);
  display:flex;align-items:center;gap:10px;min-width:280px;font-size:.9rem;
  animation:slideUp .3s ease;border-right:4px solid var(--primary);
}
.toast.t-success{border-color:var(--success)}
.toast.t-error{border-color:var(--danger)}
.toast.t-warning{border-color:var(--warning)}
.toast i{font-size:1.1rem}
.toast.t-success i{color:var(--success)}
.toast.t-error i{color:var(--danger)}
.toast.t-warning i{color:var(--warning)}

/* ============ UTILS ============ */
.flex{display:flex;align-items:center;gap:10px}
.divider{height:1px;background:var(--border);margin:16px 0}
.text-muted{color:var(--muted);font-size:.85rem}
.text-success{color:var(--success)}
.text-danger{color:var(--danger)}
.fw-bold{font-weight:700}
.empty-state{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-state i{font-size:2.5rem;margin-bottom:12px;display:block;opacity:.4}
.loading{text-align:center;padding:40px;color:var(--muted)}
.loading i{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.clinic-tag{
  display:inline-block;padding:3px 10px;border-radius:6px;font-size:.76rem;font-weight:600;
  background:var(--primary-light);color:var(--primary-dark);
}
@media(max-width:1024px){
  .stats-row{grid-template-columns:1fr 1fr}
  #app{grid-template-columns:1fr}
  .sidebar{display:none}
  .main{margin-right:0}
}
@media print{
  .sidebar,.top-bar,.no-print{display:none!important}
  .main{margin:0;padding:20px}
  .card{box-shadow:none;border:1px solid #ddd}
}
/* Receipt print */
.receipt-print{max-width:380px;margin:0 auto}
.rp-line{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--border)}
.rp-total{display:flex;justify-content:space-between;padding:14px 0;font-size:1.2rem;font-weight:800;color:var(--primary);border-top:2px solid var(--dark)}
</style>
</head>
<body>

<div id="toasts"></div>

<!-- ═══════════════════════════════════════════════════════
     LOGIN PAGE
═══════════════════════════════════════════════════════ -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon-wrap"><i class="fas fa-hospital-alt"></i></div>
      <h1>نظام الاستقبال</h1>
      <p>عيادات الشفاء الطبية</p>
    </div>
    <div class="form-group">
      <label><i class="fas fa-user"></i> اسم المستخدم</label>
      <input type="text" id="lgUser" placeholder="أدخل اسم المستخدم" autocomplete="username">
    </div>
    <div class="form-group">
      <label><i class="fas fa-lock"></i> كلمة المرور</label>
      <input type="password" id="lgPass" placeholder="أدخل كلمة المرور" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">
      <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
    </button>
    <div id="lgError" class="hidden" style="margin-top:14px;background:#fee2e2;color:#991b1b;padding:12px;border-radius:10px;font-size:.88rem;text-align:center"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     MAIN APP
═══════════════════════════════════════════════════════ -->
<div id="app" class="hidden">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="s-icon"><i class="fas fa-hospital-alt"></i></div>
      <h2>عيادات الشفاء</h2>
      <div class="role">نظام الاستقبال</div>
    </div>

    <div class="nav-section">
      <div class="nav-label">القائمة الرئيسية</div>
      <div class="nav-item active" onclick="goTo('home')"><i class="fas fa-chart-pie"></i><span>الرئيسية</span></div>
      <div class="nav-item" onclick="goTo('patients')"><i class="fas fa-users"></i><span>المرضى</span></div>
      <div class="nav-item" onclick="goTo('register')"><i class="fas fa-user-plus"></i><span>تسجيل مريض</span></div>
      <div class="nav-item" onclick="goTo('payment')"><i class="fas fa-cash-register"></i><span>المحاسبة السريعة</span></div>
    </div>
    <div class="nav-section" style="margin-top:8px">
      <div class="nav-label">الإدارة</div>
      <div class="nav-item" onclick="goTo('settings')"><i class="fas fa-cog"></i><span>الإعدادات</span></div>
    </div>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="av" id="sideAv">R</div>
        <div class="uc-info">
          <div class="uc-name" id="sideName">-</div>
          <div class="uc-role">موظف استقبال</div>
        </div>
      </div>
      <button class="btn btn-outline" style="width:100%;font-size:.85rem" onclick="doLogout()">
        <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="top-bar">
      <h1 id="pageTitle">الرئيسية</h1>
      <div class="tb-right">
        <div class="clock-badge"><i class="fas fa-clock"></i><span id="clockEl">--:--</span></div>
        <div class="clock-badge" style="background:#d1fae5;color:#065f46"><i class="fas fa-calendar"></i><span id="dateEl">-</span></div>
      </div>
    </div>
    <div id="view"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     MODAL CONTAINER
═══════════════════════════════════════════════════════ -->

/* ═══════════════════════════════════════════════════
   CRYPTO UTILS (PBKDF2 in browser)
═══════════════════════════════════════════════════ */
async function hashPassword(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name:'PBKDF2', salt:enc.encode(salt), iterations:100000, hash:'SHA-256' },
    keyMaterial, 256
  );
  return btoa(String.fromCharCode(...new Uint8Array(bits)));
}
function randomSalt() {
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr));
}

async function doLogin() {
  const u = document.getElementById('lgUser').value.trim();
  const p = document.getElementById('lgPass').value;
  if (!u || !p) return showToast('أدخل اسم المستخدم وكلمة المرور', 'warning');

  try {
    const { data:users, error } = await db.from('users')
      .select('*').eq('username', u).eq('is_active', true).limit(1);

    if (error || !users?.length) return showLoginError('اسم المستخدم غير موجود');

    const user = users[0];

    // First-run: placeholder hashes — set real hash
    if (user.password_hash === 'PLACEHOLDER_HASH') {
      const salt = randomSalt();
      const hash = await hashPassword(p, salt);
      await db.from('users').update({ password_hash: hash, password_salt: salt }).eq('id', user.id);
      user.password_hash = hash;
      user.password_salt = salt;
    }

    const hash = await hashPassword(p, user.password_salt);
    if (hash !== user.password_hash) return showLoginError('كلمة المرور غير صحيحة');

    // Update last login
    await db.from('users').update({ last_login: new Date().toISOString() }).eq('id', user.id);
    await addAudit(user, 'login', 'users', user.id, `تسجيل دخول: ${user.full_name}`);

    currentUser = user;
    startApp();
  } catch(e) {
    showLoginError('خطأ في الاتصال بقاعدة البيانات: ' + e.message);
  }
}

function showLoginError(msg) {

/* ═══════════════════════════════════════════════════

function fmt(date) { return date ? new Date(date).toLocaleDateString('ar-JO') : '-'; }
function fmtTime(date) { return date ? new Date(date).toLocaleTimeString('ar-JO', {hour:'2-digit', minute:'2-digit'}) : '-'; }
function fmtCur(n) { return new Intl.NumberFormat('ar-JO', {style:'currency', currency:'JOD'}).format(n || 0); }
function calcAge(bd) {
  if (!bd) return null;
  const t = new Date(), b = new Date(bd);
  let a = t.getFullYear() - b.getFullYear();
  if (t.getMonth() < b.getMonth() || (t.getMonth() === b.getMonth() && t.getDate() < b.getDate())) a--;
  return a;
}
function fmtAge(bd) { const a = calcAge(bd); return a === null ? '-' : a + ' سنة'; }
function statusBadge(s) {
  const map = { waiting:['b-waiting','بانتظار'], in_progress:['b-in_progress','قيد العلاج'], completed:['b-completed','تم العلاج'], paid:['b-paid','تم الدفع'] };
  const [cls, lbl] = map[s] || ['b-waiting', s];
  return `<span class="badge ${cls}">${lbl}</span>`;
}
function clinicName(id) {
  const map = { dental:'الأسنان', cosmetic:'التجميل', derma:'الجلدية', general:'العامة', ent:'أنف وأذن', all:'عامة' };
  return map[id] || id;
}
function showToast(msg, type='success') {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  const icon = type==='success'?'fa-check-circle':type==='error'?'fa-times-circle':'fa-exclamation-circle';
  t.className = `toast t-${type}`;
  t.innerHTML = `<i class="fas ${icon}"></i><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
function openModal(html, large=false) {
  document.getElementById('modalRoot').innerHTML = `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal${large?' modal-lg':''}">${html}</div></div>`;
}

  else if (currentView === 'home') viewHome();
}

async function deletePatient(id) {

  await db.from('patients').delete().eq('id', id);
  await addAudit(currentUser, 'delete', 'patients', id, 'حذف مريض');
  showToast('تم حذف المريض', 'warning');
  viewPatients();
}

  const { data, error } = await db.from('patients').insert({
    name, phone, birth_date: birth,
    gender: document.getElementById('rGender').value,
    clinic_id: clinic,
    id_number: document.getElementById('rId').value,
    notes: document.getElementById('rNotes').value,
    status: 'waiting',
    created_by: currentUser.id

  if (error) return showToast('خطأ في التسجيل: ' + error.message, 'error');

  await addAudit(currentUser, 'add', 'patients', data.id, `تسجيل مريض جديد: ${name}`);

function renderProcItems(list) {
  if (!list.length) return '<p class="text-muted" style="padding:16px">لا توجد إجراءات</p>';
  return list.map(p => `
    <div class="proc-item" onclick="addToCart('${p.id}','${p.name.replace(/'/g,"\\'")}',${p.default_price})">
      <div>
        <div class="pi-name">${p.name}</div>
        <div class="pi-clinic">${clinicName(p.clinic_id)}</div>
      </div>
      <div class="pi-price">${fmtCur(p.default_price)}</div>
    </div>
  `).join('');
}

function filterProcs() {
  const q = document.getElementById('procSearch').value.toLowerCase();
  const filtered = procedures.filter(p => p.name.toLowerCase().includes(q));
  document.getElementById('procItems').innerHTML = renderProcItems(filtered);
}

function setPayPatient(id) {
  selectedPaymentPatient = allPatients.find(p => p.id === id) || null;
  if (!selectedPaymentPatient) {
    document.getElementById('selPatInfo').innerHTML = '';
    return;
  }
  const p = selectedPaymentPatient;
  document.getElementById('selPatInfo').innerHTML = `
    <div style="background:var(--primary-light);border-radius:10px;padding:12px 16px;display:flex;gap:16px;flex-wrap:wrap">
      <span><b>${p.name}</b></span>
      <span class="text-muted">${fmtAge(p.birth_date)}</span>
      <span class="clinic-tag">${clinicName(p.clinic_id)}</span>
      ${statusBadge(p.status)}
    </div>
  `;
}

function addToCart(id, name, price) {
  cart.push({ id, name, price: Number(price) });
  renderCart();
}

function addCustom() {
  const name = document.getElementById('customProcName').value.trim();
  const price = parseFloat(document.getElementById('customAmt').value);
  if (!name || isNaN(price)) return showToast('أدخل اسم الإجراء والمبلغ', 'warning');
  cart.push({ id: 'custom_' + Date.now(), name, price });
  document.getElementById('customProcName').value = '';
  document.getElementById('customAmt').value = '';
  renderCart();
}

function removeFromCart(idx) {
  cart.splice(idx, 1);
  renderCart();
}

function renderCart() {
  const total = cart.reduce((s, i) => s + i.price, 0);
  document.getElementById('cartItems').innerHTML = cart.length
    ? cart.map((item, i) => `
        <div class="cart-item">
          <div><div class="ci-name">${item.name}</div></div>
          <div class="flex"><span class="ci-price">${fmtCur(item.price)}</span>
            <button class="ci-del" onclick="removeFromCart(${i})"><i class="fas fa-times"></i></button>
          </div>
        </div>
      `).join('')
    : '<p class="text-muted" style="font-size:.85rem">لا توجد إجراءات</p>';
  document.getElementById('cartTotal').textContent = `الإجمالي: ${fmtCur(total)}`;
}

function selPM(el, method) {
  document.querySelectorAll('.pm-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  selectedPaymentMethod = method;
}

async function confirmPayment() {
  if (!selectedPaymentPatient) return showToast('اختر مريضاً أولاً', 'error');
  if (!cart.length) return showToast('أضف إجراء واحد على الأقل', 'error');
  if (!selectedPaymentMethod) return showToast('اختر طريقة الدفع', 'error');

  const total = cart.reduce((s, i) => s + i.price, 0);
  const procName = cart.map(i => i.name).join(' + ');

  const { data, error } = await db.from('payments').insert({
    patient_id: selectedPaymentPatient.id,
    procedure_name: procName,
    amount: total,
    payment_method: selectedPaymentMethod,
    created_by: currentUser.full_name
  }).select().single();

  if (error) return showToast('خطأ: ' + error.message, 'error');

  // Update patient status
  await db.from('patients').update({ status: 'paid' }).eq('id', selectedPaymentPatient.id);
  await addAudit(currentUser, 'add', 'payments', data.id, `دفعة ${fmtCur(total)} للمريض ${selectedPaymentPatient.name}`);

  showToast(`تم تسجيل الدفع: ${fmtCur(total)}`);
  showReceiptModal(data, selectedPaymentPatient, cart, total);

  cart = [];
  selectedPaymentPatient = null;
  selectedPaymentMethod = null;
}

/* ---- Users management ---- */
function openAddUser() {
  openModal(`
    <div class="modal-header">
      <h2><i class="fas fa-user-plus" style="color:var(--primary)"></i> مستخدم جديد</h2>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="fgrid">
      <div class="form-group"><label>الاسم الكامل *</label><input id="nuName" type="text" placeholder="الاسم"></div>
      <div class="form-group"><label>اسم المستخدم *</label><input id="nuUser" type="text" placeholder="username" dir="ltr"></div>
      <div class="form-group"><label>كلمة المرور *</label><input id="nuPass" type="password" placeholder="كلمة المرور"></div>
      <div class="form-group"><label>الصلاحية</label>
        <select id="nuRole"><option value="reception">استقبال</option><option value="admin">مدير</option></select>
      </div>
    </div>
    <div class="flex" style="margin-top:16px">
      <button class="btn btn-primary" onclick="saveNewUser()"><i class="fas fa-save"></i> حفظ</button>
      <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
    </div>
  `);
}

async function saveNewUser() {
  const name  = document.getElementById('nuName').value.trim();
  const uname = document.getElementById('nuUser').value.trim();
  const pass  = document.getElementById('nuPass').value;
  const role  = document.getElementById('nuRole').value;
  if (!name || !uname || !pass) return showToast('أكمل الحقول المطلوبة', 'error');
  if (pass.length < 6) return showToast('كلمة المرور 6 أحرف على الأقل', 'error');

  const salt = randomSalt();
  const hash = await hashPassword(pass, salt);

  const { error } = await db.from('users').insert({
    username: uname, password_hash: hash, password_salt: salt,
    full_name: name, role, created_by: currentUser.id
  });
  if (error) return showToast('خطأ: ' + (error.message.includes('unique') ? 'اسم المستخدم موجود مسبقاً' : error.message), 'error');
  await addAudit(currentUser, 'add', 'users', uname, `إضافة مستخدم جديد: ${name}`);
  showToast('تم إضافة المستخدم بنجاح');
  closeModal();
  viewSettings();
}

async function toggleUser(id, isActive) {
  await db.from('users').update({ is_active: !isActive }).eq('id', id);
  await addAudit(currentUser, 'edit', 'users', id, `${isActive?'إيقاف':'تفعيل'} مستخدم`);
  showToast(isActive ? 'تم إيقاف المستخدم' : 'تم تفعيل المستخدم');
  viewSettings();
}

async function deleteUser(id, name) {
  if (!confirm(`هل أنت متأكد من حذف المستخدم "${name}"؟`)) return;
  await db.from('users').delete().eq('id', id);
  await addAudit(currentUser, 'delete', 'users', id, `حذف مستخدم: ${name}`);
  showToast('تم حذف المستخدم', 'warning');
  viewSettings();
}

function resetUserPass(id, name) {
  openModal(`
    <div class="modal-header">
      <h2><i class="fas fa-key" style="color:var(--warning)"></i> إعادة تعيين كلمة مرور — ${name}</h2>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="form-group">
      <label>كلمة المرور الجديدة *</label>
      <input type="password" id="rpNew" placeholder="كلمة المرور الجديدة">
    </div>
    <div class="flex" style="margin-top:16px">
      <button class="btn btn-warning" onclick="doResetPass('${id}','${name}')"><i class="fas fa-key"></i> إعادة التعيين</button>
      <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
    </div>
  `);
}

async function doResetPass(id, name) {
  const pass = document.getElementById('rpNew').value;
  if (!pass || pass.length < 6) return showToast('كلمة المرور 6 أحرف على الأقل', 'error');
  const salt = randomSalt();
  const hash = await hashPassword(pass, salt);
  await db.from('users').update({ password_hash: hash, password_salt: salt }).eq('id', id);
  await addAudit(currentUser, 'edit', 'users', id, `إعادة تعيين كلمة مرور: ${name}`);
  showToast('تم تغيير كلمة المرور بنجاح');
  closeModal();
}

async function changeMyPassword() {
  const cur = document.getElementById('curPass').value;
  const nw  = document.getElementById('newPass').value;
  const cf  = document.getElementById('confPass').value;
  if (!cur || !nw || !cf) return showToast('أكمل جميع الحقول', 'error');
  if (nw !== cf) return showToast('كلمة المرور الجديدة غير متطابقة', 'error');
  if (nw.length < 6) return showToast('كلمة المرور 6 أحرف على الأقل', 'error');

  const curHash = await hashPassword(cur, currentUser.password_salt);
  if (curHash !== currentUser.password_hash) return showToast('كلمة المرور الحالية غير صحيحة', 'error');

  const salt = randomSalt();
  const hash = await hashPassword(nw, salt);
  await db.from('users').update({ password_hash: hash, password_salt: salt }).eq('id', currentUser.id);
  currentUser.password_hash = hash;
  currentUser.password_salt = salt;
  await addAudit(currentUser, 'edit', 'users', currentUser.id, 'تغيير كلمة المرور الشخصية');
  showToast('تم تغيير كلمة المرور بنجاح');
  document.getElementById('curPass').value = '';
  document.getElementById('newPass').value = '';
  document.getElementById('confPass').value = '';
}

}

async function saveNewProc() {
  const name  = document.getElementById('pnName').value.trim();
  const clinic= document.getElementById('pnClinic').value;
  const price = parseFloat(document.getElementById('pnPrice').value || '0');
  if (!name) return showToast('أدخل اسم الإجراء', 'error');

  await db.from('procedures').insert({
    name, clinic_id: clinic, default_price: price, created_by: currentUser.id
  });
  await loadProcedures();
  await addAudit(currentUser, 'add', 'procedures', name, `إضافة إجراء: ${name}`);
  showToast('تم إضافة الإجراء');
  closeModal();
  viewSettings();
}

async function toggleProc(id, isActive) {
  await db.from('procedures').update({ is_active: !isActive }).eq('id', id);
  await loadProcedures();
  showToast(isActive ? 'تم إخفاء الإجراء' : 'تم إظهار الإجراء');
  viewSettings();
}

async function deleteProc(id, name) {
  if (!confirm(`حذف الإجراء "${name}"؟`)) return;
  await db.from('procedures').delete().eq('id', id);
  await loadProcedures();
  await addAudit(currentUser, 'delete', 'procedures', id, `حذف إجراء: ${name}`);
  showToast('تم حذف الإجراء', 'warning');
  viewSettings();
}

// Enter key for login
document.getElementById('lgPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('lgUser').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
